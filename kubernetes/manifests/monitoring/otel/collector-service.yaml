apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc # Default OTLP gRPC port
      port: 4317
      targetPort: 4317
    - name: otlp-http # Default OTLP HTTP port
      port: 4318
      targetPort: 4318
    - name: metrics # Prometheus metrics scrape port
      port: 8889
      targetPort: 8889
