apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sabareeshkk/homelab.git
    targetRevision: main
    path: kubernetes/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
