---
- name: Check if Kubernetes is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kube_admin_conf

- name: Create /etc/kubernetes/manifests directory
  file:
    path: /etc/kubernetes/manifests
    state: directory

- name: Render kube-vip static pod manifest
  template:
    src: kube-vip.yaml.j2
    dest: /etc/kubernetes/manifests/kube-vip.yaml

- name: Initialize Kubernetes cluster (Primary Master)
  command: kubeadm init --control-plane-endpoint="{{ kube_vip_address }}:6443" --upload-certs --pod-network-cidr=10.244.0.0/16
  when: inventory_hostname == groups['master'][0] and not kube_admin_conf.stat.exists
  register: kubeadm_init

- name: Generate join command for workers
  command: kubeadm token create --print-join-command
  register: worker_join_command_raw
  when: inventory_hostname == groups['master'][0]

- name: Upload new certificates (Primary Master)
  command: kubeadm init phase upload-certs --upload-certs
  register: upload_certs_raw
  when: inventory_hostname == groups['master'][0]

- name: Set worker join command fact
  set_fact:
    join_command: "{{ worker_join_command_raw.stdout }}"
  when: inventory_hostname == groups['master'][0]

- name: Set master join command fact
  set_fact:
    master_join_command: "{{ worker_join_command_raw.stdout }} --control-plane --certificate-key {{ upload_certs_raw.stdout_lines[-1] }}"
  when: inventory_hostname == groups['master'][0]

- name: Join Secondary Masters to the cluster
  command: "{{ hostvars[groups['master'][0]]['master_join_command'] }}"
  when: inventory_hostname != groups['master'][0] and not kube_admin_conf.stat.exists

- name: Create .kube directory
  file:
    path: /root/.kube
    state: directory
    mode: "0755"

- name: Copy admin.conf to /root/.kube/config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes

- name: Fetch kubeconfig to localhost
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ lookup('env', 'HOME') }}/.kube/config"
    flat: yes
  when: inventory_hostname == groups['master'][0]

- name: Download Helm install script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: "0755"
  run_once: true

- name: Run Helm install script
  command: /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm
  run_once: true

- name: Add Flannel Helm repository
  kubernetes.core.helm_repository:
    name: flannel
    repo_url: https://flannel-io.github.io/flannel/
  delegate_to: localhost
  become: false
  run_once: true

- name: Create kube-flannel namespace
  kubernetes.core.k8s:
    name: kube-flannel
    api_version: v1
    kind: Namespace
    state: present
  delegate_to: localhost
  become: false
  run_once: true

- name: Install Flannel CNI via Helm
  kubernetes.core.helm:
    name: flannel
    chart_ref: flannel/flannel
    release_namespace: kube-flannel
    values:
      podCidr: "10.244.0.0/16"
  delegate_to: localhost
  become: false
  run_once: true
